# Baseline B2: bidirectional LSTM (isolates "causality / no future context")
# Everything else matches the proposed CRNN baseline. Latency curve here will
# look optimistic at early frames because the BiLSTM can see future context;
# this is exactly the property we are testing the value of.
dataset: ravdess
run_name: baseline_bilstm
data_root: data/processed/ravdess
num_classes: 4
emotions: [happy, sad, angry, neutral]
sample_rate: 16000
n_mels: 128
win_length_ms: 25
hop_length_ms: 10
model:
  arch: anisotropic
  conv_channels: [1, 8, 16, 32, 64]
  kernel_freq: 32
  kernel_time: 1
  freq_stride: 1
  lstm_hidden: 64
  lstm_layers: 1
  bidirectional: true
  dropout: 0.5
train:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.1
  test_fraction: 0.1
  loss_mode: per_frame
augment:
  freq_mask_max: 27
  time_mask_max: 80
  n_freq_masks: 2
  n_time_masks: 2
