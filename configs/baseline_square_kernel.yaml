# Baseline B1: square 3x3 kernels (isolates "frequency-first kernel shape")
# Everything else matches the proposed CRNN baseline byte-for-byte:
#   unidirectional LSTM, per-frame loss, SpecAugment, same conv_channels.
# Freq is halved per layer via stride=2 (128 -> 64 -> 32 -> 16 -> 8) so the
# LSTM input stays comparable in scale (512 vs proposed 256).
dataset: ravdess
run_name: baseline_square_kernel
data_root: data/processed/ravdess
num_classes: 4
emotions: [happy, sad, angry, neutral]
sample_rate: 16000
n_mels: 128
win_length_ms: 25
hop_length_ms: 10
model:
  arch: anisotropic
  conv_channels: [1, 8, 16, 32, 64]
  kernel_freq: 3
  kernel_time: 3
  freq_stride: 2
  lstm_hidden: 64
  lstm_layers: 1
  bidirectional: false
  dropout: 0.5
train:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.1
  test_fraction: 0.1
  loss_mode: per_frame
augment:
  freq_mask_max: 27
  time_mask_max: 80
  n_freq_masks: 2
  n_time_masks: 2
